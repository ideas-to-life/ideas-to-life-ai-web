<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-label="Pipeline Intelligence Snapshot pattern diagram">
  <defs>
    <!-- Styling tokens -->
    <style>
      .bg { fill: #0b0b0c; }
      .panel { fill: #111114; stroke: #2a2a2f; stroke-width: 2; rx: 18; }
      .node { fill: #0f0f12; stroke: #3a3a42; stroke-width: 2; rx: 16; }
      .title { font: 600 22px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; fill: #f2f2f4; }
      .subtitle { font: 500 14px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; fill: #b8b8c2; }
      .label { font: 600 14px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; fill: #e6e6ea; letter-spacing: 0.3px; }
      .note { font: 500 12px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; fill: #a6a6b1; }
      .mono { font: 600 12px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; fill: #b8b8c2; }
      .arrow { stroke: #5a5a66; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
      .dashed { stroke-dasharray: 7 7; }
    </style>

    <!-- Arrow marker -->
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#5a5a66"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect class="bg" x="0" y="0" width="1200" height="520" rx="22"/>

  <!-- Top header -->
  <rect class="panel" x="36" y="28" width="1128" height="92"/>
  <text class="title" x="64" y="68">Pipeline Intelligence Snapshot</text>
  <text class="subtitle" x="64" y="98">Produce a canonical artifact to consolidate distributed agent signals into a single system state</text>
  <text class="mono" x="1048" y="68" text-anchor="end">patternId: pipeline-intelligence-snapshot</text>

  <!-- Nodes area panel -->
  <rect class="panel" x="36" y="140" width="1128" height="344"/>

  <!-- Node 1 -->
  <rect class="node" x="60" y="220" width="220" height="120"/>
  <text class="label" x="170" y="255" text-anchor="middle">Distributed Agents</text>
  <text class="note"  x="170" y="282" text-anchor="middle">Compute partial signals</text>
  <text class="note"  x="170" y="304" text-anchor="middle">in shared pipeline context</text>

  <!-- Node 2 -->
  <rect class="node" x="340" y="220" width="220" height="120"/>
  <text class="label" x="450" y="255" text-anchor="middle">Snapshot Builder</text>
  <text class="note"  x="450" y="282" text-anchor="middle">Aggregates signals</text>
  <text class="note"  x="450" y="304" text-anchor="middle">post-execution</text>

  <!-- Node 3 -->
  <rect class="node" x="620" y="220" width="220" height="120"/>
  <text class="label" x="730" y="255" text-anchor="middle">Intelligence Artifact</text>
  <text class="note"  x="730" y="282" text-anchor="middle">Canonical system state</text>
  <text class="note"  x="730" y="304" text-anchor="middle">(e.g. Runner Snapshot)</text>

  <!-- Node 4 -->
  <rect class="node" x="900" y="220" width="220" height="120"/>
  <text class="label" x="1010" y="255" text-anchor="middle">Downstream</text>
  <text class="note"  x="1010" y="282" text-anchor="middle">UI, Integrations,</text>
  <text class="note"  x="1010" y="304" text-anchor="middle">and Analytics</text>

  <!-- Arrows -->
  <path class="arrow" d="M 280 280 L 340 280"/>
  <path class="arrow" d="M 560 280 L 620 280"/>
  <path class="arrow" d="M 840 280 L 900 280"/>

</svg>
