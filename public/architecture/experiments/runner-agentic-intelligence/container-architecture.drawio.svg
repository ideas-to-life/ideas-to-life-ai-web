  <line x1="890" y1="835" x2="1395" y2="570" class="edge"/>
  <rect x="70" y="895" width="1390" height="55" fill="#fff2cc" stroke="#d6b656" stroke-width="2"/>
  <text x="90" y="928" class="small">Architecture signals: orchestrator-managed pipeline, prompt schema contracts, deterministic guardrail, graceful fallback router behavior, and derived documentation from evidence are all evidenced in the repo and overlaid into this layered container view.</text>
