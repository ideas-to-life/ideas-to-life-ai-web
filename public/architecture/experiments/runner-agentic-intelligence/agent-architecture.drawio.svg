<svg xmlns="http://www.w3.org/2000/svg" width="1680" height="1080" viewBox="0 0 1680 1080">
  <defs>
    <style>
      text { font-family: Arial, sans-serif; fill: #222; }
      .title { font-size: 24px; font-weight: 700; }
      .label { font-size: 15px; font-weight: 700; }
      .small { font-size: 12px; }
      .edge { stroke: #555; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 z" fill="#555"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1680" height="1080" fill="#ffffff"/>
  <text x="40" y="48" class="title">Runner Agentic Intelligence: Agent Architecture</text>

  <rect x="70" y="100" width="1540" height="860" rx="14" ry="14" fill="#fffdf5" stroke="#c9b458" stroke-width="2"/>
  <text x="100" y="135" class="label">Derived from `src/agents/`, `src/tools/`, `src/persistence/`, `src/llm/`, `src/router/`, and Gradio entrypoints</text>

  <rect x="120" y="190" width="240" height="100" rx="12" ry="12" fill="#f5f5f5" stroke="#666" stroke-width="2"/>
  <text x="240" y="228" text-anchor="middle" class="label">User Interaction</text>
  <text x="240" y="252" text-anchor="middle" class="small">Runner via Gradio UI</text>
  <text x="240" y="272" text-anchor="middle" class="small">upload + chat + chart requests</text>

  <rect x="460" y="170" width="330" height="140" rx="14" ry="14" fill="#ede7f6" stroke="#7e57c2" stroke-width="3"/>
  <text x="625" y="215" text-anchor="middle" class="label">Orchestrator Agent</text>
  <text x="625" y="241" text-anchor="middle" class="small">`RunnerOrchestrator`</text>
  <text x="625" y="263" text-anchor="middle" class="small">builds repositories, services, agents,</text>
  <text x="625" y="283" text-anchor="middle" class="small">and executes the pipeline / chat routing</text>

  <rect x="460" y="370" width="920" height="320" rx="14" ry="14" fill="#f7f2ff" stroke="#7e57c2" stroke-width="2"/>
  <text x="490" y="405" class="label">Specialized Agents</text>

  <rect x="510" y="440" width="190" height="85" rx="10" ry="10" fill="#ede7f6" stroke="#7e57c2" stroke-width="2"/>
  <text x="605" y="474" text-anchor="middle" class="label">Feature Engineering Agent</text>
  <text x="605" y="496" text-anchor="middle" class="small">deterministic per-run features</text>

  <rect x="730" y="440" width="170" height="85" rx="10" ry="10" fill="#ede7f6" stroke="#7e57c2" stroke-width="2"/>
  <text x="815" y="474" text-anchor="middle" class="label">Insights Agent</text>
  <text x="815" y="496" text-anchor="middle" class="small">LLM coaching insights</text>

  <rect x="930" y="440" width="170" height="85" rx="10" ry="10" fill="#ede7f6" stroke="#7e57c2" stroke-width="2"/>
  <text x="1015" y="474" text-anchor="middle" class="label">Plan Agent</text>
  <text x="1015" y="496" text-anchor="middle" class="small">LLM weekly plan generation</text>

  <rect x="1130" y="440" width="200" height="85" rx="10" ry="10" fill="#ede7f6" stroke="#7e57c2" stroke-width="2"/>
  <text x="1230" y="474" text-anchor="middle" class="label">Visualization Agent</text>
  <text x="1230" y="496" text-anchor="middle" class="small">LLM chart spec generation</text>

  <rect x="620" y="560" width="190" height="85" rx="10" ry="10" fill="#ede7f6" stroke="#7e57c2" stroke-width="2"/>
  <text x="715" y="594" text-anchor="middle" class="label">Chat Agent</text>
  <text x="715" y="616" text-anchor="middle" class="small">contextual conversational response</text>

  <rect x="860" y="560" width="220" height="85" rx="10" ry="10" fill="#ede7f6" stroke="#7e57c2" stroke-width="2"/>
  <text x="970" y="594" text-anchor="middle" class="label">Guardrail Agent</text>
  <text x="970" y="616" text-anchor="middle" class="small">heuristic injury / fatigue risk</text>

  <rect x="120" y="390" width="250" height="250" rx="14" ry="14" fill="#fff7ef" stroke="#d79b00" stroke-width="2"/>
  <text x="150" y="425" class="label">Tools and Deterministic Helpers</text>
  <text x="150" y="458" class="small">`load_runs_from_uploaded_files`</text>
  <text x="150" y="480" class="small">parser / validation pipeline</text>
  <text x="150" y="512" class="small">`TemplateVisualizationExecutor`</text>
  <text x="150" y="534" class="small">`InMemoryFeatureStore`</text>
  <text x="150" y="556" class="small">`InMemoryPlanStore`</text>
  <text x="150" y="588" class="small">router compaction + hooks</text>

  <rect x="120" y="710" width="250" height="170" rx="14" ry="14" fill="#eef5ff" stroke="#6c8ebf" stroke-width="2"/>
  <text x="150" y="745" class="label">Shared Services</text>
  <text x="150" y="778" class="small">SnapshotService, BriefService</text>
  <text x="150" y="800" class="small">GoalService, StructureService</text>
  <text x="150" y="822" class="small">Recommendation / Positioning / Trajectory</text>

  <path d="M1410 410 C1410 390, 1570 390, 1570 410 L1570 530 C1570 550, 1410 550, 1410 530 Z" fill="#e1d5e7" stroke="#9673a6" stroke-width="2"/>
  <path d="M1410 410 C1410 430, 1570 430, 1570 410" fill="none" stroke="#9673a6" stroke-width="2"/>
  <text x="1490" y="468" text-anchor="middle" class="label">Shared Memory / Persistence</text>
  <text x="1490" y="492" text-anchor="middle" class="small">SQLite repositories</text>
  <text x="1490" y="512" text-anchor="middle" class="small">runs, weekly snapshots, trends,</text>
  <text x="1490" y="530" text-anchor="middle" class="small">analysis, goals, planned sessions</text>

  <rect x="1370" y="620" width="240" height="180" rx="14" ry="14" fill="#eef5ff" stroke="#6c8ebf" stroke-width="2"/>
  <text x="1490" y="655" text-anchor="middle" class="label">LLM Abstraction Layer</text>
  <text x="1490" y="680" text-anchor="middle" class="small">`get_llm_client` + LiteLLMClient</text>
  <text x="1490" y="702" text-anchor="middle" class="small">model registry</text>
  <text x="1490" y="724" text-anchor="middle" class="small">structured output hardening</text>
  <text x="1490" y="746" text-anchor="middle" class="small">provider-specific profiles</text>

  <rect x="1370" y="840" width="240" height="90" rx="12" ry="12" fill="#f5f5f5" stroke="#666" stroke-width="2"/>
  <text x="1490" y="875" text-anchor="middle" class="label">External Model Providers</text>
  <text x="1490" y="898" text-anchor="middle" class="small">Gemini / OpenAI / Hugging Face</text>

  <rect x="930" y="740" width="250" height="110" rx="12" ry="12" fill="#eef5ff" stroke="#6c8ebf" stroke-width="2"/>
  <text x="1055" y="775" text-anchor="middle" class="label">Router and Prompt System</text>
  <text x="1055" y="800" text-anchor="middle" class="small">`async_route` for CHAT vs CHART</text>
  <text x="1055" y="822" text-anchor="middle" class="small">language prompts in `src/prompts/`</text>

  <line x1="360" y1="240" x2="460" y2="240" class="edge"/>
  <text x="410" y="230" text-anchor="middle" class="small">uploads and asks questions</text>

  <line x1="625" y1="310" x2="605" y2="440" class="edge"/>
  <line x1="625" y1="310" x2="815" y2="440" class="edge"/>
  <line x1="625" y1="310" x2="1015" y2="440" class="edge"/>
  <line x1="625" y1="310" x2="1230" y2="440" class="edge"/>
  <line x1="625" y1="310" x2="715" y2="560" class="edge"/>
  <line x1="625" y1="310" x2="970" y2="560" class="edge"/>

  <line x1="370" y1="500" x2="510" y2="482" class="edge"/>
  <text x="440" y="470" text-anchor="middle" class="small">ingestion inputs</text>
  <line x1="370" y1="560" x2="1230" y2="482" class="edge"/>
  <text x="760" y="545" text-anchor="middle" class="small">visualization executor and stores</text>
  <line x1="370" y1="800" x2="625" y2="285" class="edge"/>
  <text x="430" y="700" text-anchor="middle" class="small">domain services support orchestration</text>

  <line x1="1330" y1="482" x2="1410" y2="482" class="edge"/>
  <line x1="1080" y1="602" x2="1410" y2="482" class="edge"/>
  <line x1="815" y1="525" x2="1370" y2="690" class="edge"/>
  <line x1="1015" y1="525" x2="1370" y2="710" class="edge"/>
  <line x1="1230" y1="525" x2="1370" y2="730" class="edge"/>
  <line x1="715" y1="645" x2="930" y2="795" class="edge"/>
  <line x1="625" y1="310" x2="930" y2="775" class="edge"/>
  <line x1="1490" y1="800" x2="1490" y2="840" class="edge"/>

  <rect x="70" y="985" width="1540" height="55" fill="#fff2cc" stroke="#d6b656" stroke-width="2"/>
  <text x="90" y="1018" class="small">Notes: the central intelligence coordinator is `RunnerOrchestrator`. Chat uses routing plus the ChatAgent and VisualizationAgent on demand. Feature engineering is implemented as an agent today, although roadmap/docs suggest it may later move to a more tool-like boundary.</text>
</svg>
