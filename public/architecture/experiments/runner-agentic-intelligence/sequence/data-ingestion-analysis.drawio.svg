<svg xmlns="http://www.w3.org/2000/svg" width="1820" height="1100" viewBox="0 0 1820 1100">
  <defs>
    <style>
      text { font-family: Arial, sans-serif; fill: #222; }
      .title { font-size: 24px; font-weight: 700; }
      .label { font-size: 14px; font-weight: 700; }
      .small { font-size: 12px; }
      .edge { stroke: #555; stroke-width: 2; fill: none; marker-end: url(#arrow2); }
      .life { stroke: #999; stroke-dasharray: 6 4; }
    </style>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 z" fill="#555"/>
    </marker>
  </defs>
  <rect width="1820" height="1100" fill="#fff"/>
  <text x="40" y="48" class="title">Sequence: Data Ingestion and Analysis</text>

  <rect x="70" y="90" width="1680" height="940" rx="14" ry="14" fill="#fffdf5" stroke="#c9b458" stroke-width="2"/>
  <text x="100" y="125" class="label">Observed flow from `_process_uploads()`, `load_runs_from_uploaded_files()`, `RunnerOrchestrator.run()`, and pipeline steps</text>

  <rect x="110" y="150" width="140" height="50" rx="10" ry="10" fill="#f5f5f5" stroke="#666" stroke-width="2"/>
  <text x="180" y="180" text-anchor="middle" class="label">Runner</text>
  <rect x="310" y="150" width="170" height="50" rx="10" ry="10" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <text x="395" y="180" text-anchor="middle" class="label">Gradio Upload Flow</text>
  <rect x="540" y="150" width="170" height="50" rx="10" ry="10" fill="#ffe6cc" stroke="#d79b00" stroke-width="2"/>
  <text x="625" y="180" text-anchor="middle" class="label">Ingestion Loader</text>
  <rect x="770" y="150" width="190" height="50" rx="10" ry="10" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <text x="865" y="180" text-anchor="middle" class="label">RunnerOrchestrator</text>
  <rect x="1020" y="150" width="150" height="50" rx="10" ry="10" fill="#ffe6cc" stroke="#d79b00" stroke-width="2"/>
  <text x="1095" y="180" text-anchor="middle" class="label">Pipeline</text>
  <rect x="1230" y="150" width="160" height="50" rx="10" ry="10" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <text x="1310" y="180" text-anchor="middle" class="label">SnapshotService</text>
  <rect x="1450" y="150" width="150" height="50" rx="10" ry="10" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <text x="1525" y="180" text-anchor="middle" class="label">Repositories</text>
  <rect x="1660" y="150" width="120" height="50" rx="10" ry="10" fill="#ede7f6" stroke="#7e57c2" stroke-width="2"/>
  <text x="1720" y="180" text-anchor="middle" class="label">Agents</text>

  <line x1="180" y1="200" x2="180" y2="965" class="life"/>
  <line x1="395" y1="200" x2="395" y2="965" class="life"/>
  <line x1="625" y1="200" x2="625" y2="965" class="life"/>
  <line x1="865" y1="200" x2="865" y2="965" class="life"/>
  <line x1="1095" y1="200" x2="1095" y2="965" class="life"/>
  <line x1="1310" y1="200" x2="1310" y2="965" class="life"/>
  <line x1="1525" y1="200" x2="1525" y2="965" class="life"/>
  <line x1="1720" y1="200" x2="1720" y2="965" class="life"/>

  <line x1="180" y1="240" x2="395" y2="240" class="edge"/>
  <text x="288" y="230" text-anchor="middle" class="small">upload files and click Analyse Data</text>
  <line x1="395" y1="290" x2="625" y2="290" class="edge"/>
  <text x="510" y="280" text-anchor="middle" class="small">load_runs_from_uploaded_files(files)</text>
  <line x1="625" y1="340" x2="625" y2="380" class="edge"/>
  <text x="720" y="365" class="small">validate uploads, copy/decompress temp files, detect type, parse TCX/GPX/FIT, sort runs</text>
  <line x1="625" y1="430" x2="395" y2="430" class="edge"/>
  <text x="510" y="420" text-anchor="middle" class="small">return run dicts</text>
  <line x1="395" y1="490" x2="865" y2="490" class="edge"/>
  <text x="630" y="480" text-anchor="middle" class="small">await orchestrator.run(runs, language)</text>
  <line x1="865" y1="540" x2="1095" y2="540" class="edge"/>
  <text x="980" y="530" text-anchor="middle" class="small">RunnerPipeline.execute(context)</text>
  <line x1="1095" y1="590" x2="1720" y2="590" class="edge"/>
  <text x="1408" y="580" text-anchor="middle" class="small">feature engineering step then guardrail/intelligence/viz agents</text>
  <line x1="1095" y1="650" x2="1310" y2="650" class="edge"/>
  <text x="1202" y="640" text-anchor="middle" class="small">snapshot_step - recompute affected weeks</text>
  <line x1="1310" y1="700" x2="1525" y2="700" class="edge"/>
  <text x="1418" y="690" text-anchor="middle" class="small">load runs, save weekly snapshots/trends</text>
  <line x1="1310" y1="760" x2="1720" y2="760" class="edge"/>
  <text x="1515" y="750" text-anchor="middle" class="small">optional BriefService generation / deterministic fallback</text>
  <line x1="1095" y1="830" x2="1525" y2="830" class="edge"/>
  <text x="1310" y="820" text-anchor="middle" class="small">persist analysis record and derived state</text>
  <line x1="865" y1="900" x2="395" y2="900" class="edge"/>
  <text x="630" y="890" text-anchor="middle" class="small">return summary, charts, insights, plan, profile state</text>
  <line x1="395" y1="950" x2="180" y2="950" class="edge"/>
  <text x="288" y="940" text-anchor="middle" class="small">render results UI</text>

  <rect x="100" y="1045" width="1640" height="35" fill="#fff2cc" stroke="#d6b656" stroke-width="2"/>
  <text x="120" y="1067" class="small">Note: the upload path persists runs before snapshot recomputation, then derives weekly/trend state, then invokes intelligence and visualization before returning renderable outputs to the UI.</text>
</svg>
