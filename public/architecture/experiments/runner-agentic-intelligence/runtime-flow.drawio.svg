<svg xmlns="http://www.w3.org/2000/svg" width="1520" height="1120" viewBox="0 0 1520 1120">
  <defs>
    <style>
      text { font-family: Arial, sans-serif; fill: #222; }
      .title { font-size: 24px; font-weight: 700; }
      .label { font-size: 15px; font-weight: 700; }
      .small { font-size: 12px; }
      .edge { stroke: #555; stroke-width: 2; fill: none; marker-end: url(#arrow4); }
    </style>
    <marker id="arrow4" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 z" fill="#555"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1520" height="1120" fill="#ffffff"/>
  <text x="40" y="48" class="title">Runner Agentic Intelligence: Runtime Flow</text>
  <rect x="70" y="120" width="1360" height="860" rx="14" ry="14" fill="#fff7ef" stroke="#d79b00" stroke-width="2"/>
  <text x="100" y="156" class="label">Primary Runtime: Upload to Coaching Outputs</text>
  <rect x="130" y="210" width="210" height="70" rx="10" ry="10" fill="#f5f5f5" stroke="#666" stroke-width="2"/>
  <text x="235" y="250" text-anchor="middle" class="label">Runner uploads files</text>
  <rect x="130" y="320" width="210" height="80" rx="10" ry="10" fill="#ffe6cc" stroke="#d79b00" stroke-width="2"/>
  <text x="235" y="355" text-anchor="middle" class="label">Ingestion pipeline</text>
  <text x="235" y="377" text-anchor="middle" class="small">detect, parse, validate running data</text>
  <rect x="130" y="440" width="210" height="80" rx="10" ry="10" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <text x="235" y="475" text-anchor="middle" class="label">Orchestrator builds context</text>
  <text x="235" y="497" text-anchor="middle" class="small">repos, services, agents, runner profile</text>
  <rect x="430" y="190" width="270" height="350" rx="12" ry="12" fill="#fffdf5" stroke="#c9b458" stroke-width="2"/>
  <text x="460" y="225" class="label">Pipeline sequence</text>
  <rect x="470" y="250" width="190" height="58" rx="10" ry="10" fill="#ffe6cc" stroke="#d79b00" stroke-width="2"/>
  <text x="565" y="285" text-anchor="middle" class="label">Feature engineering</text>
  <rect x="470" y="325" width="190" height="58" rx="10" ry="10" fill="#ffe6cc" stroke="#d79b00" stroke-width="2"/>
  <text x="565" y="360" text-anchor="middle" class="label">Persist runs</text>
  <rect x="470" y="400" width="190" height="58" rx="10" ry="10" fill="#ffe6cc" stroke="#d79b00" stroke-width="2"/>
  <text x="565" y="435" text-anchor="middle" class="label">Recompute snapshots</text>
  <rect x="470" y="475" width="190" height="58" rx="10" ry="10" fill="#ffe6cc" stroke="#d79b00" stroke-width="2"/>
  <text x="565" y="510" text-anchor="middle" class="label">Risk + positioning + trajectory</text>
  <rect x="770" y="190" width="610" height="250" rx="12" ry="12" fill="#f7f2ff" stroke="#7e57c2" stroke-width="2"/>
  <text x="800" y="225" class="label">Parallel AI block</text>
  <rect x="830" y="270" width="150" height="70" rx="10" ry="10" fill="#ede7f6" stroke="#7e57c2" stroke-width="2"/>
  <text x="905" y="310" text-anchor="middle" class="label">InsightsAgent</text>
  <rect x="1010" y="270" width="150" height="70" rx="10" ry="10" fill="#ede7f6" stroke="#7e57c2" stroke-width="2"/>
  <text x="1085" y="310" text-anchor="middle" class="label">PlanAgent</text>
  <rect x="1190" y="270" width="150" height="70" rx="10" ry="10" fill="#ede7f6" stroke="#7e57c2" stroke-width="2"/>
  <text x="1265" y="310" text-anchor="middle" class="label">VisualizationAgent</text>
  <text x="800" y="382" class="small">`RunnerPipeline` executes `IntelligenceStep` and `VisualizationStep` concurrently.</text>
  <text x="800" y="404" class="small">Within `IntelligenceStep`, Insights and Plan run in parallel when positioning changed materially.</text>
  <rect x="770" y="490" width="610" height="150" rx="12" ry="12" fill="#eef5ff" stroke="#6c8ebf" stroke-width="2"/>
  <text x="800" y="525" class="label">Sequential completion</text>
  <text x="800" y="552" class="small">BriefService generates performance brief and focus.</text>
  <text x="800" y="574" class="small">GuardrailArbitrationService applies safety adjustments to the plan.</text>
  <text x="800" y="596" class="small">PersistAnalysisStep stores summary, trends, insights JSON, and plan content.</text>
  <rect x="770" y="690" width="610" height="150" rx="12" ry="12" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <text x="800" y="725" class="label">Outputs</text>
  <text x="800" y="752" class="small">UI renders weekly summary, insights, training plan, charts, and performance card.</text>
  <text x="800" y="774" class="small">Chat flow can later reuse recent insights through router-guided CHAT/CHART behavior.</text>
  <line x1="340" y1="245" x2="430" y2="245" class="edge"/>
  <line x1="235" y1="280" x2="235" y2="320" class="edge"/>
  <line x1="235" y1="400" x2="235" y2="440" class="edge"/>
  <line x1="340" y1="480" x2="430" y2="480" class="edge"/>
  <line x1="565" y1="308" x2="565" y2="325" class="edge"/>
  <line x1="565" y1="383" x2="565" y2="400" class="edge"/>
  <line x1="565" y1="458" x2="565" y2="475" class="edge"/>
  <line x1="700" y1="510" x2="770" y2="310" class="edge"/>
  <line x1="980" y1="305" x2="1010" y2="305" class="edge"/>
  <line x1="1160" y1="305" x2="1190" y2="305" class="edge"/>
  <line x1="1085" y1="340" x2="1085" y2="490" class="edge"/>
  <line x1="1085" y1="640" x2="1085" y2="690" class="edge"/>
  <rect x="70" y="1010" width="1360" height="70" fill="#fff2cc" stroke="#d6b656" stroke-width="2"/>
  <text x="90" y="1048" class="small">Architecture signals present in this runtime: orchestrator-managed pipeline, deterministic guardrail, graceful fallback for no/low-history cases, and structured prompt/schema enforcement behind the agent calls.</text>
</svg>
