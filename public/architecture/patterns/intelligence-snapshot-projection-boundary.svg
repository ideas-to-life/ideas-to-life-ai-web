<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-label="Intelligence Snapshot Projection Boundary pattern diagram">
  <defs>
    <style>
      .bg { fill: #0b0b0c; } .panel { fill: #111114; stroke: #2a2a2f; stroke-width: 2; rx: 18; } .node { fill: #0f0f12; stroke: #3a3a42; stroke-width: 2; rx: 16; } .title { font: 600 22px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; fill: #f2f2f4; } .subtitle { font: 500 14px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; fill: #b8b8c2; } .label { font: 600 14px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; fill: #e6e6ea; letter-spacing: 0.3px; } .note { font: 500 12px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; fill: #a6a6b1; } .mono { font: 600 12px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, &quot;Liberation Mono&quot;, monospace; fill: #b8b8c2; } .arrow { stroke: #5a5a66; stroke-width: 3; fill: none; marker-end: url(#arrowhead); } .dashed { stroke-dasharray: 7 7; } .boundary { fill: none; stroke: #5a5a66; stroke-width: 2; stroke-dasharray: 10 8; rx: 18; }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M 0 0 L 12 6 L 0 12 z" fill="#5a5a66"/></marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1200" height="620" rx="22"/>
  <rect class="panel" x="36" y="28" width="1128" height="92"/>
  <text class="title" x="64" y="68">Intelligence Snapshot Projection Boundary</text>
  <text class="subtitle" x="64" y="98">The merge introduces a distinct derived model that aggregates agent and service outputs into a stable UI-facing intelligence snapshot.</text>
  <text class="mono" x="1048" y="68" text-anchor="end">patternId: intelligence-snapshot-projection-boundary</text>
  <rect class="panel" x="36" y="140" width="1128" height="452"/>
