  <text class="label" x="220" y="318" text-anchor="middle">Runtime pipeline</text>
  <text class="note" x="220" y="346" text-anchor="middle">agents and services</text>
  <text class="note" x="220" y="368" text-anchor="middle">produce context</text>
  <rect class="boundary" x="390" y="220" width="360" height="260"/>
  <text class="label" x="570" y="252" text-anchor="middle">Stable boundary</text>
  <text class="note" x="570" y="276" text-anchor="middle">projection or contract layer</text>
  <rect class="node" x="450" y="310" width="240" height="120"/>
  <text class="label" x="570" y="345" text-anchor="middle">Snapshot builder</text>
  <text class="note" x="570" y="372" text-anchor="middle">project rich state</text>
  <text class="note" x="570" y="394" text-anchor="middle">separate persistence</text>
  <rect class="node" x="820" y="200" width="290" height="110"/>
  <text class="label" x="965" y="234" text-anchor="middle">UI surface</text>
  <text class="note" x="965" y="262" text-anchor="middle">render stable data</text>
  <rect class="node" x="820" y="340" width="290" height="110"/>
  <text class="label" x="965" y="374" text-anchor="middle">Persistence</text>
