<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-label="Typed Execution Context diagram">
  <defs>
    <style>
      .bg { fill: #0b0b0c; }
      .panel { fill: #111114; stroke: #2a2a2f; stroke-width: 2; rx: 18; }
      .node { fill: #0f0f12; stroke: #3a3a42; stroke-width: 2; rx: 16; }
      .title { font: 600 22px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; fill: #f2f2f4; }
      .subtitle { font: 500 14px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; fill: #b8b8c2; }
      .label { font: 600 14px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; fill: #e6e6ea; letter-spacing: 0.3px; }
      .note { font: 500 12px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; fill: #a6a6b1; }
      .mono { font: 600 12px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; fill: #b8b8c2; }
      .arrow { stroke: #5a5a66; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
      .dashed { stroke: #3a3a42; stroke-width: 2; fill: none; stroke-dasharray: 7 7; rx: 16; }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#5a5a66"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="520" rx="22"/>

  <rect class="panel" x="36" y="28" width="1128" height="92"/>
  <text class="title" x="64" y="68">Typed Execution Context</text>
  <text class="subtitle" x="64" y="98">A versioned, structured object carrying state across a multi-step pipeline</text>
  <text class="mono" x="1048" y="68" text-anchor="end">patternId: typed-execution-context</text>

  <rect class="panel" x="36" y="140" width="1128" height="344"/>

  <rect class="node" x="80" y="220" width="220" height="120"/>
  <text class="label" x="190" y="255" text-anchor="middle">Step A</text>
  <text class="note"  x="190" y="282" text-anchor="middle">ingestion +</text>
  <text class="note"  x="190" y="304" text-anchor="middle">enrichment</text>

  <rect class="dashed" x="380" y="180" width="440" height="200"/>
  <text class="label" x="600" y="215" text-anchor="middle">PipelineContext</text>
  <text class="note"  x="600" y="242" text-anchor="middle">Shared Typed Contract</text>
  <rect class="node" x="420" y="260" width="360" height="80"/>
  <text class="mono" x="600" y="305" text-anchor="middle">runs: List[Run] | insights: Dict</text>

  <rect class="node" x="900" y="220" width="220" height="120"/>
  <text class="label" x="1010" y="255" text-anchor="middle">Step B</text>
  <text class="note"  x="1010" y="282" text-anchor="middle">reads context +</text>
  <text class="note"  x="1010" y="304" text-anchor="middle">generates plan</text>

  <path class="arrow" d="M 300 280 L 380 280"/>
  <path class="arrow" d="M 820 280 L 900 280"/>

  <text class="note" x="80" y="180">Notes: Centralises state and enforces type safety between independent agents.</text>
</svg>