  <line x1="605" y1="290" x2="1155" y2="415" class="edge"/>
  <line x1="605" y1="290" x2="670" y2="545" class="edge"/>
  <line x1="605" y1="290" x2="940" y2="545" class="edge"/>

  <line x1="350" y1="460" x2="460" y2="458" class="edge"/>
  <text x="405" y="446" text-anchor="middle" class="small">content queries and rendering helpers</text>
  <line x1="350" y1="560" x2="605" y2="262" class="edge"/>
  <text x="420" y="522" text-anchor="middle" class="small">schema validation and discovery</text>

  <line x1="1250" y1="459" x2="1360" y2="430" class="edge"/>
  <line x1="1050" y1="590" x2="1360" y2="455" class="edge"/>
  <line x1="780" y1="590" x2="1360" y2="475" class="edge"/>
  <line x1="1475" y1="520" x2="1475" y2="620" class="edge"/>
  <line x1="1475" y1="785" x2="1475" y2="830" class="edge"/>

  <rect x="70" y="980" width="1540" height="60" fill="#fff2cc" stroke="#d6b656" stroke-width="2"/>
  <text x="90" y="1016" class="small">Notes: this repository does not implement runtime LLM agents. The closest analogue to an orchestrator is the Astro route/layout layer, which coordinates content loading, page composition, and filesystem-backed diagram discovery. Agent boundaries were inferred from route modules rather than invented conversational agents.</text>
